<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="同学" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>同学 - 多人监督学习</title>
    <style>
      /* 加载回退 - 当 React 加载失败时显示 */
      #app-loading {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 16px;
        background: #4f46e5; color: white;
        z-index: 99999;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        transition: opacity 0.5s ease;
      }
      #app-loading.hidden { opacity: 0; pointer-events: none; }
      #app-loading .spinner {
        width: 40px; height: 40px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #app-loading h1 { font-size: 28px; font-weight: bold; margin: 0; }
      #app-loading p { font-size: 14px; opacity: 0.8; margin: 0; }
    </style>
    <script>
      // 安全回退：5 秒后自动隐藏加载界面（即使 React 加载失败）
      setTimeout(function() {
        var el = document.getElementById('app-loading');
        if (el) el.classList.add('hidden');
      }, 5000);
    </script>
  </head>
  <body class="bg-gray-50">
    <div id="app-loading">
      <div class="spinner"></div>
      <h1>同学</h1>
      <p>多人监督学习</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
